# cargo-deny configuration for conda-pronto
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Advisory database checks (RustSec)
[advisories]
ignore = []

# License policy -- allow project-compatible OSS licenses for binary distribution.
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "bzip2-1.0.6",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

# Dependency bans
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Source restrictions -- crates.io only
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
