[workspace]
name = "conda-ship"
description = "Build ready-to-run conda runtimes"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
license = "BSD-3-Clause"

[dependencies]
rust = ">=1.85"
cargo-llvm-cov = ">=0.6"
sccache = ">=0.10"

[activation.env]
RUSTC_WRAPPER = "sccache"

[tasks]
build = "cargo build --release --bin cs"
build-debug = "cargo build --bin cs"
check-lock = "cargo run -p conda-ship -- inspect --json > /dev/null"
test = "cargo test --release --features runtime-template"
test-all = "cargo test --release --features runtime-template,online_tests"
coverage = "cargo llvm-cov --features runtime-template --lcov --output-path lcov.info"
coverage-html = "cargo llvm-cov --features runtime-template --html"
fmt-check = "cargo fmt --check"
clippy = "cargo clippy --all-targets --features runtime-template -- -D warnings"
lint = { depends-on = ["fmt-check", "clippy"] }
demos = { cmd = """bash -c 'if [ -n "$1" ]; then vhs "demos/$1.tape"; else for tape in demos/*.tape; do [[ "$(basename "$tape")" == _* ]] && continue; vhs "$tape"; done; fi' -- {{ name }}""", args = [{ arg = "name", default = "" }], description = "Record demo GIFs" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-reredirects = ">=0.1"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml . _build/dirhtml", cwd = "docs" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }
docs-clean = { cmd = "rm -rf _build", cwd = "docs" }

[feature.ship.dependencies]
python = ">=3.12"
conda = ">=25.1"
conda-rattler-solver = "*"
conda-spawn = ">=0.1.0"

[feature.test.dependencies]
python = ">=3.12"
conda = ">=25.1"
pytest = ">=8.0"
ruff = ">=0.15"

[feature.test.pypi-dependencies]
conda-ship = { path = ".", editable = true }

[feature.test.tasks]
pytest = "python -m pytest python/tests"
ruff-check = "ruff check python pyproject.toml"
ruff-format-check = "ruff format --check python pyproject.toml"

[environments]
docs = ["docs"]
ship = { features = ["ship"], no-default-feature = true }
test = ["test"]

[tool.conda-ship]
source-environment = "ship"
exclude = ["conda-libmamba-solver"]
