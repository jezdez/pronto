[workspace]
name = "pronto"
description = "Build ready-to-run conda bootstrap binaries"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
license = "BSD-3-Clause"

[dependencies]
rust = ">=1.85"
cargo-llvm-cov = ">=0.6"
sccache = ">=0.10"

[activation.env]
RUSTC_WRAPPER = "sccache"

[tasks]
prepare = "cargo run -p pronto -- lock"
check-lock = "cargo run -p pronto -- lock --check"
bundle = "cargo run -p pronto -- bundle"
build = "cargo build --release"
build-debug = "cargo build"
test = "cargo test --release"
test-all = "cargo test --release --features online_tests,slow_tests"
coverage = "cargo llvm-cov --lcov --output-path lcov.info"
coverage-html = "cargo llvm-cov --html"
fmt-check = "cargo fmt --check"
clippy = "cargo clippy --all-targets -- -D warnings"
lint = { depends-on = ["fmt-check", "clippy"] }
demos = { cmd = """bash -c 'if [ -n "$1" ]; then vhs "demos/$1.tape"; else for tape in demos/*.tape; do [[ "$(basename "$tape")" == _* ]] && continue; vhs "$tape"; done; fi' -- {{ name }}""", args = [{ arg = "name", default = "" }], description = "Record demo GIFs" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-reredirects = ">=0.1"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml . _build/dirhtml", cwd = "docs" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }
docs-clean = { cmd = "rm -rf _build", cwd = "docs" }

[feature.cx-env.dependencies]
python = ">=3.12"
conda = ">=25.1"
conda-rattler-solver = "*"
conda-spawn = ">=0.1.0"
conda-pypi = "*"
conda-self = "*"
conda-workspaces = ">=0.4.0"

[environments]
docs = ["docs"]
cx-env = { features = ["cx-env"], no-default-feature = true }

[tool.cx]
channels = ["conda-forge"]
packages = [
    "python >=3.12",
    "conda >=25.1",
    "conda-rattler-solver",
    "conda-spawn >=0.1.0",
    "conda-pypi",
    "conda-self",
    "conda-global",
    "conda-workspaces >=0.4.0",
]
exclude = ["conda-libmamba-solver"]
