[workspace]
name = "conda-pronto"
description = "Build ready-to-run conda bootstrap binaries"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
license = "BSD-3-Clause"

[dependencies]
rust = ">=1.85"
cargo-llvm-cov = ">=0.6"
sccache = ">=0.10"

[activation.env]
RUSTC_WRAPPER = "sccache"

[tasks]
prepare = "cargo run -p conda-pronto -- lock"
check-lock = "cargo run -p conda-pronto -- lock --check"
bundle = "cargo run -p conda-pronto -- bundle"
build = "cargo build --release --bin pronto"
build-debug = "cargo build --bin pronto"
test = { cmd = "cargo test --release --features runtime-template", depends-on = ["prepare"] }
test-all = { cmd = "cargo test --release --features runtime-template,online_tests,slow_tests", depends-on = ["prepare"] }
coverage = { cmd = "cargo llvm-cov --features runtime-template --lcov --output-path lcov.info", depends-on = ["prepare"] }
coverage-html = { cmd = "cargo llvm-cov --features runtime-template --html", depends-on = ["prepare"] }
fmt-check = "cargo fmt --check"
clippy = { cmd = "cargo clippy --all-targets --features runtime-template -- -D warnings", depends-on = ["prepare"] }
lint = { depends-on = ["fmt-check", "clippy"] }
demos = { cmd = """bash -c 'if [ -n "$1" ]; then vhs "demos/$1.tape"; else for tape in demos/*.tape; do [[ "$(basename "$tape")" == _* ]] && continue; vhs "$tape"; done; fi' -- {{ name }}""", args = [{ arg = "name", default = "" }], description = "Record demo GIFs" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-reredirects = ">=0.1"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml . _build/dirhtml", cwd = "docs" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }
docs-clean = { cmd = "rm -rf _build", cwd = "docs" }

[feature.runtime.dependencies]
python = ">=3.12"
conda = ">=25.1"
conda-rattler-solver = "*"
conda-spawn = ">=0.1.0"

[feature.test.dependencies]
python = ">=3.12"
conda = ">=25.1"
pytest = ">=8.0"
ruff = ">=0.15"

[feature.test.pypi-dependencies]
conda-pronto = { path = ".", editable = true }

[feature.test.tasks]
pytest = "python -m pytest python/tests"
ruff-check = "ruff check python pyproject.toml"
ruff-format-check = "ruff format --check python pyproject.toml"

[environments]
docs = ["docs"]
runtime = { features = ["runtime"], no-default-feature = true }
test = ["test"]

[tool.pronto]
environment = "runtime"
channels = ["conda-forge"]
packages = [
    "python >=3.12",
    "conda >=25.1",
    "conda-rattler-solver",
    "conda-spawn >=0.1.0",
]
exclude = ["conda-libmamba-solver"]
