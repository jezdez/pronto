name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "action.yml"
      - "src/**"
      - "tests/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pixi.toml"
      - "pixi.lock"
      - "pyproject.toml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Use pre-C23 C ABI for C dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: echo "CFLAGS=-std=gnu17" >> "$GITHUB_ENV"

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build
        run: pixi run build

      - name: Test
        run: pixi run test

      - name: Build runtime template
        run: pixi run -- cargo build --locked --release --bin pronto-runtime --features runtime-template

      - name: Build smoke runtime
        shell: bash
        run: |
          pronto="./target/release/pronto"
          template="./target/release/pronto-runtime"
          if [[ "$TARGET" == *"windows"* ]]; then
            pronto="${pronto}.exe"
            template="${template}.exe"
          fi
          "$pronto" build \
            --layout online \
            --name demo \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template "$template"

      - name: Smoke test built runtime
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN="./dist/demo-${TARGET}.exe"
          else
            BIN="./dist/demo-${TARGET}"
          fi
          "$BIN" bootstrap --prefix "$RUNNER_TEMP/demo-smoke"
          "$BIN" status --prefix "$RUNNER_TEMP/demo-smoke"

      - name: Build embedded bundle
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          ./target/release/pronto build \
            --layout embedded \
            --name demo \
            --target "$TARGET" \
            --target-label "$TARGET" \
            --template ./target/release/pronto-runtime

      - name: Smoke test embedded bundle
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          ./dist/demoz-"$TARGET" bootstrap --prefix "$RUNNER_TEMP/demoz-smoke"
          ./dist/demoz-"$TARGET" status --prefix "$RUNNER_TEMP/demoz-smoke"

      - name: Stage canary binary
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            ASSET_NAME="demo-${TARGET}.exe"
          else
            ASSET_NAME="demo-${TARGET}"
          fi
          cp "dist/${ASSET_NAME}" "${ASSET_NAME}"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload canary binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          retention-days: 3

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    environment: codecov
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Use pre-C23 C ABI for C dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: echo "CFLAGS=-std=gnu17" >> "$GITHUB_ENV"

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Generate coverage
        run: pixi run coverage

      - name: Check Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          if [ -n "$CODECOV_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Codecov
        if: steps.codecov-token.outputs.has_token == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          cache: true

      - name: Use pre-C23 C ABI for C dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: echo "CFLAGS=-std=gnu17" >> "$GITHUB_ENV"

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Check runtime lock derivation
        run: pixi run check-lock

      - name: Lint
        run: pixi run lint
