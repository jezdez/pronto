name: Build custom conda runtime

on:
  workflow_call:
    inputs:
      name:
        description: "Distribution binary name to build."
        required: true
        type: string
      root:
        description: "Project root containing conda.toml/conda.lock or pixi.toml/pixi.lock."
        required: false
        type: string
        default: "project"
      layout:
        description: "Artifact layout to build: none or embedded."
        required: false
        type: string
        default: "none"
      docs-url:
        description: "Documentation URL embedded in the runtime help output."
        required: false
        type: string
        default: "https://jezdez.github.io/conda-pronto/"
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Resolve action wrapper ref
        id: resolve
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          action_ref="${WORKFLOW_REF##*@}"
          echo "action_ref=${action_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: project
          persist-credentials: false

      - name: Checkout action wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jezdez/conda-pronto
          ref: ${{ steps.resolve.outputs.action_ref }}
          path: .conda-pronto-action
          fetch-depth: 0
          persist-credentials: false

      - name: Build runtime
        id: pronto
        uses: ./.conda-pronto-action
        with:
          name: ${{ inputs.name }}
          root: ${{ inputs.root }}
          layout: ${{ inputs.layout }}
          docs-url: ${{ inputs.docs-url }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pronto.outputs.asset-name }}
          path: |
            ${{ steps.pronto.outputs.binary-path }}
            ${{ steps.pronto.outputs.info-path }}
            ${{ steps.pronto.outputs.lock-path }}
            ${{ steps.pronto.outputs.package-list-path }}
            ${{ steps.pronto.outputs.checksums-path }}
          retention-days: ${{ inputs.retention-days }}
