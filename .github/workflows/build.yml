name: Build custom cx

on:
  workflow_call:
    inputs:
      packages:
        description: >
          Comma-separated conda package specs to include in the bootstrapper.
          Example: "python >=3.12, conda >=25.1, numpy, pandas"
          Defaults to the packages defined in pixi.toml [tool.pronto].
        required: false
        type: string
        default: ""
      channels:
        description: >
          Comma-separated conda channels.
          Defaults to the channels defined in pixi.toml [tool.pronto].
        required: false
        type: string
        default: ""
      exclude:
        description: >
          Comma-separated packages to exclude from the bootstrapper
          (along with their exclusive dependencies).
          Defaults to the excludes defined in pixi.toml [tool.pronto].
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref of Pronto to build from (tag, branch, or SHA)."
        required: false
        type: string
        default: "main"
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7
      embed-bundle:
        description: >
          Embed package archives into the binary for offline bootstrap
          (increases size by 40-85 MB depending on platform). The output binary uses the z-suffixed artifact name.
        required: false
        type: string
        default: "false"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Build cx
        id: build
        uses: jezdez/pronto@main
        with:
          packages: ${{ inputs.packages }}
          channels: ${{ inputs.channels }}
          exclude: ${{ inputs.exclude }}
          ref: ${{ inputs.ref }}
          embed-bundle: ${{ inputs.embed-bundle }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: ${{ inputs.retention-days }}
