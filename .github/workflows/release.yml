name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload."
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-assets:
    name: Build release assets (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release assets
      artifact-metadata: write # create artifact storage records for attestations
    env:
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+)*([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            echo "Use a version tag such as v0.1.0." >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          cache: false

      - name: Verify runner target
        shell: bash
        run: |
          host="$(pixi run -- rustc -vV | sed -n 's/^host: //p')"
          if [ "$host" != "$TARGET" ]; then
            echo "Expected runner target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - name: Build pronto CLI
        run: pixi run -- cargo build --locked --release --bin pronto

      - name: Build runtime template
        run: pixi run -- cargo build --locked --release --bin pronto-runtime --features runtime-template

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-assets
          ext=""
          if [[ "$TARGET" == *"windows"* ]]; then
            ext=".exe"
          fi
          cp "target/release/pronto${ext}" "release-assets/pronto-${TARGET}${ext}"
          cp "target/release/pronto-runtime${ext}" "release-assets/pronto-runtime-template-${TARGET}${ext}"

      - name: Attest release assets
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets/*
          retention-days: 7

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build-assets

    permissions:
      contents: write # create or update the GitHub release for this tag
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release metadata
      artifact-metadata: write # create artifact storage records for attestations

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Write SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          find . -type f ! -name SHA256SUMS -print | sort | while read -r path; do
            sha256sum "${path#./}"
          done > SHA256SUMS

      - name: Attest checksum manifest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/SHA256SUMS

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          files=(release-assets/*)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes "conda-pronto ${RELEASE_TAG}"
          fi
