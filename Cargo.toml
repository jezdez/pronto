[package]
name = "conda-express"
version = "0.1.3"
edition = "2024"
description = "A lightweight, single-binary conda bootstrapper — powered by rattler"
license = "BSD-3-Clause"
readme = "README.md"

[[bin]]
name = "cx"
path = "src/main.rs"

[features]
default = ["rustls-tls"]
native-tls = [
  "reqwest/native-tls",
  "rattler/native-tls",
  "rattler_repodata_gateway/native-tls",
  "rattler_networking/native-tls",
  "rattler_cache/native-tls",
]
rustls-tls = [
  "reqwest/rustls-tls",
  "reqwest/rustls-tls-native-roots",
  "rattler/rustls-tls",
  "rattler_repodata_gateway/rustls-tls",
  "rattler_networking/rustls-tls",
  "rattler_cache/rustls-tls",
]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
console = "0.16"
dirs = "6"
indicatif = "0.18"
miette = { version = "7.6", features = ["fancy"] }
rattler = { version = "0.39", default-features = false, features = ["indicatif"] }
rattler_cache = { version = "0.6", default-features = false }
rattler_conda_types = { version = "0.43", default-features = false }
rattler_lock = { version = "0.26", default-features = false }
rattler_networking = { version = "0.26", default-features = false }
rattler_repodata_gateway = { version = "0.26", default-features = false, features = ["gateway"] }
rattler_solve = { version = "4.2", default-features = false, features = ["resolvo"] }
rattler_virtual_packages = { version = "2.3", default-features = false }
reqwest = { version = "0.12", default-features = false, features = ["stream"] }
reqwest-middleware = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.45", features = ["rt-multi-thread", "macros"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[build-dependencies]
rattler = { version = "0.39", default-features = false, features = ["rustls-tls"] }
rattler_cache = { version = "0.6", default-features = false, features = ["rustls-tls"] }
rattler_conda_types = { version = "0.43", default-features = false }
rattler_lock = { version = "0.26", default-features = false }
rattler_networking = { version = "0.26", default-features = false, features = ["rustls-tls"] }
rattler_repodata_gateway = { version = "0.26", default-features = false, features = ["gateway", "rustls-tls"] }
rattler_solve = { version = "4.2", default-features = false, features = ["resolvo"] }
rattler_virtual_packages = { version = "2.3", default-features = false }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "rustls-tls-native-roots"] }
reqwest-middleware = "0.4"
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
tokio = { version = "1.45", features = ["rt-multi-thread"] }
toml = "0.8"

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
strip = true
