name: "Build conda bootstrap binary"
description: >
  Build a custom conda bootstrap binary with your choice of conda packages
  baked in. Runs on the current runner — use a matrix strategy for
  multi-platform builds.
branding:
  icon: package
  color: green

inputs:
  packages:
    description: >
      Comma-separated conda package specs to include in the bootstrapper.
      Example: "python >=3.12, conda >=25.1, numpy, pandas".
      When empty, uses the default packages from this Pronto configuration.
    required: false
    default: ""
  channels:
    description: >
      Comma-separated conda channels.
      When empty, uses the default (conda-forge).
    required: false
    default: ""
  exclude:
    description: >
      Comma-separated packages to exclude (along with their exclusive
      dependencies). When empty, uses the default exclusions.
    required: false
    default: ""
  ref:
    description: "Git ref of Pronto to build from (tag, branch, or SHA)."
    required: false
    default: "main"
  embed-bundle:
    description: >
      Embed package archives into the binary for offline bootstrap
      (increases size by 40-85 MB depending on platform). The output binary is named cxz instead of cx.
    required: false
    default: "false"
  embed-payload:
    description: >
      Deprecated alias for embed-bundle. Use embed-bundle for new workflows.
    required: false
    default: "false"

outputs:
  binary-path:
    description: "Absolute path to the built cx binary."
    value: ${{ steps.stage.outputs.binary_path }}
  asset-name:
    description: "Platform-qualified asset name (e.g. cx-aarch64-apple-darwin)."
    value: ${{ steps.stage.outputs.asset_name }}

runs:
  using: composite
  steps:
    - name: Checkout Pronto
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: jezdez/pronto
        ref: ${{ inputs.ref }}
        path: .pronto-build

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      with:
        manifest-path: .pronto-build/pixi.toml
        cache: true

    - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - name: Configure custom packages
      if: inputs.packages != '' || inputs.channels != '' || inputs.exclude != ''
      shell: bash
      working-directory: .pronto-build
      run: |
        ARGS=""
        if [ -n "${{ inputs.packages }}" ]; then
          ARGS="$ARGS --packages '${{ inputs.packages }}'"
        fi
        if [ -n "${{ inputs.channels }}" ]; then
          ARGS="$ARGS --channels '${{ inputs.channels }}'"
        fi
        if [ -n "${{ inputs.exclude }}" ]; then
          ARGS="$ARGS --exclude '${{ inputs.exclude }}'"
        fi
        eval pixi run -- cargo run -p pronto-build -- configure $ARGS
        pixi lock
        pixi run prepare

    - name: Generate bundle
      if: inputs.embed-bundle == 'true' || inputs.embed-payload == 'true'
      shell: bash
      working-directory: .pronto-build
      run: pixi run bundle

    - name: Build cx
      shell: bash
      env:
        PRONTO_EMBED_BUNDLE: ${{ (inputs.embed-bundle == 'true' || inputs.embed-payload == 'true') && '1' || '' }}
      working-directory: .pronto-build
      run: pixi run build

    - name: Stage binary
      id: stage
      shell: bash
      env:
        EMBED_BUNDLE: ${{ (inputs.embed-bundle == 'true' || inputs.embed-payload == 'true') && 'true' || 'false' }}
      run: |
        TARGET="$(rustc -vV | grep '^host:' | cut -d' ' -f2)"
        if [[ "$EMBED_BUNDLE" == "true" ]]; then
          PREFIX="cxz"
        else
          PREFIX="cx"
        fi
        if [[ "$TARGET" == *"windows"* ]]; then
          BIN_NAME="cx.exe"
          ASSET_NAME="${PREFIX}-${TARGET}.exe"
        else
          BIN_NAME="cx"
          ASSET_NAME="${PREFIX}-${TARGET}"
        fi
        BINARY_PATH="${GITHUB_WORKSPACE}/${ASSET_NAME}"
        cp ".pronto-build/target/release/${BIN_NAME}" "${BINARY_PATH}"
        sha256sum "${BINARY_PATH}" > "${BINARY_PATH}.sha256"
        echo "binary_path=${BINARY_PATH}" >> "$GITHUB_OUTPUT"
        echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
