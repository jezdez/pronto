name: "Build conda runtime"
description: >
  Build a custom conda runtime from a committed project lockfile using
  released conda-ship artifacts. Runs on the current runner; use a matrix
  strategy for multi-platform builds.
branding:
  icon: package
  color: green

inputs:
  runtime:
    description: "Runtime name to build. Overrides [tool.conda-ship].runtime when set."
    required: false
    default: ""
  delegate:
    description: "Delegate executable inside the managed prefix. Overrides [tool.conda-ship].delegate when set."
    required: false
    default: ""
  root:
    description: "Project root containing conda.toml/conda.lock, pixi.toml/pixi.lock, or pyproject.toml with the matching lockfile."
    required: false
    default: "."
  layout:
    description: "Artifact layout to build: online, external, or embedded. Overrides [tool.conda-ship].layout when set."
    required: false
    default: ""
  docs-url:
    description: "Documentation URL embedded in the runtime help output. Overrides [tool.conda-ship].docs-url when set."
    required: false
    default: ""
  install-scheme:
    description: "Install scheme stamped into the runtime. Overrides [tool.conda-ship].install-scheme when set."
    required: false
    default: ""
  install-name:
    description: "Name used inside the install scheme. Overrides [tool.conda-ship].install-name when set."
    required: false
    default: ""
  install-method:
    description: "Package-manager or installer method stamped into the runtime. Overrides [tool.conda-ship].install-method when set."
    required: false
    default: ""

outputs:
  dist-path:
    description: "Absolute path to the directory containing all generated runtime artifacts."
    value: ${{ steps.stage.outputs.dist_path }}
  binary-path:
    description: "Absolute path to the built runtime."
    value: ${{ steps.stage.outputs.binary_path }}
  asset-name:
    description: "Platform-qualified asset name."
    value: ${{ steps.stage.outputs.asset_name }}
  info-path:
    description: "Absolute path to the artifact info JSON."
    value: ${{ steps.stage.outputs.info_path }}
  lock-path:
    description: "Absolute path to the staged runtime lock."
    value: ${{ steps.stage.outputs.lock_path }}
  package-list-path:
    description: "Absolute path to the package list."
    value: ${{ steps.stage.outputs.package_list_path }}
  checksums-path:
    description: "Absolute path to the SHA256 checksum file."
    value: ${{ steps.stage.outputs.checksums_path }}
  bundle-path:
    description: "Absolute path to the external bundle, when layout is external."
    value: ${{ steps.stage.outputs.bundle_path }}

runs:
  using: composite
  steps:
    - name: Resolve release assets
      id: resolve
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
        RUNNER_ARCH_NAME: ${{ runner.arch }}
        RUNNER_OS_NAME: ${{ runner.os }}
      run: |
        case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
          Linux/X64)
            target="x86_64-unknown-linux-gnu"
            ext=""
            ;;
          Linux/ARM64)
            target="aarch64-unknown-linux-gnu"
            ext=""
            ;;
          macOS/X64)
            target="x86_64-apple-darwin"
            ext=""
            ;;
          macOS/ARM64)
            target="aarch64-apple-darwin"
            ext=""
            ;;
          Windows/X64)
            target="x86_64-pc-windows-msvc"
            ext=".exe"
            ;;
          *)
            echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
            exit 1
            ;;
        esac

        version="$ACTION_REF"
        if [ -z "$version" ] && [ -n "$ACTION_PATH" ]; then
          version="$(git -C "$ACTION_PATH" describe --tags --exact-match 2>/dev/null || true)"
        fi
        if [[ ! "$version" =~ ^v[0-9]+([.][0-9]+)*([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "Could not infer a conda-ship release tag from ${version:-<empty>}." >&2
          echo "Use jezdez/conda-ship@vX.Y.Z. Branch refs do not have release assets." >&2
          exit 1
        fi

        repository=""
        if { [ -z "$ACTION_REF" ] || [ -z "$ACTION_REPOSITORY" ]; } && [ -n "$ACTION_PATH" ]; then
          remote="$(git -C "$ACTION_PATH" config --get remote.origin.url 2>/dev/null || true)"
          case "$remote" in
            https://github.com/*)
              repository="${remote#https://github.com/}"
              repository="${repository%.git}"
              ;;
            git@github.com:*)
              repository="${remote#git@github.com:}"
              repository="${repository%.git}"
              ;;
          esac
        fi
        if [ -z "$repository" ]; then
          repository="$ACTION_REPOSITORY"
        fi
        if [ -z "$repository" ]; then
          repository="jezdez/conda-ship"
        fi
        if [[ ! "$repository" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "Invalid action repository: ${repository}" >&2
          exit 1
        fi

        tool_dir="${RUNNER_TEMP}/conda-ship-${version}-${target}"
        mkdir -p "$tool_dir"

        echo "target=${target}" >> "$GITHUB_OUTPUT"
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "tool_dir=${tool_dir}" >> "$GITHUB_OUTPUT"
        echo "repository=${repository}" >> "$GITHUB_OUTPUT"
        echo "cs_asset=cs-${target}${ext}" >> "$GITHUB_OUTPUT"
        echo "template_asset=cs-runtime-template-${target}${ext}" >> "$GITHUB_OUTPUT"

    - name: Download conda-ship
      id: download
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        CS_ASSET: ${{ steps.resolve.outputs.cs_asset }}
        CONDA_SHIP_REPOSITORY: ${{ steps.resolve.outputs.repository }}
        CONDA_SHIP_VERSION: ${{ steps.resolve.outputs.version }}
        TEMPLATE_ASSET: ${{ steps.resolve.outputs.template_asset }}
        TOOL_DIR: ${{ steps.resolve.outputs.tool_dir }}
      run: |
        base_url="https://github.com/${CONDA_SHIP_REPOSITORY}/releases/download/${CONDA_SHIP_VERSION}"
        curl --fail --location --show-error --silent --retry 3 \
          --output "${TOOL_DIR}/${CS_ASSET}" \
          "${base_url}/${CS_ASSET}"
        curl --fail --location --show-error --silent --retry 3 \
          --output "${TOOL_DIR}/${TEMPLATE_ASSET}" \
          "${base_url}/${TEMPLATE_ASSET}"
        curl --fail --location --show-error --silent --retry 3 \
          --output "${TOOL_DIR}/SHA256SUMS" \
          "${base_url}/SHA256SUMS"

        if ! command -v gh >/dev/null 2>&1; then
          echo "GitHub CLI is required to verify release attestations." >&2
          exit 1
        fi
        signer_workflow="${CONDA_SHIP_REPOSITORY}/.github/workflows/release.yml"
        gh attestation verify "${TOOL_DIR}/${CS_ASSET}" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null
        gh attestation verify "${TOOL_DIR}/${TEMPLATE_ASSET}" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null
        gh attestation verify "${TOOL_DIR}/SHA256SUMS" \
          --repo "$CONDA_SHIP_REPOSITORY" \
          --signer-workflow "$signer_workflow" >/dev/null

        grep -F "  ${CS_ASSET}" "${TOOL_DIR}/SHA256SUMS" > "${TOOL_DIR}/SHA256SUMS.selected"
        grep -F "  ${TEMPLATE_ASSET}" "${TOOL_DIR}/SHA256SUMS" >> "${TOOL_DIR}/SHA256SUMS.selected"
        (
          cd "$TOOL_DIR"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum --check SHA256SUMS.selected
          else
            shasum -a 256 --check SHA256SUMS.selected
          fi
        )

        chmod +x "${TOOL_DIR}/${CS_ASSET}" "${TOOL_DIR}/${TEMPLATE_ASSET}" || true
        echo "cs_path=${TOOL_DIR}/${CS_ASSET}" >> "$GITHUB_OUTPUT"
        echo "template_path=${TOOL_DIR}/${TEMPLATE_ASSET}" >> "$GITHUB_OUTPUT"

    - name: Build runtime
      shell: bash
      env:
        CONDA_SHIP_DELEGATE: ${{ inputs.delegate }}
        CONDA_SHIP_DOCS_URL: ${{ inputs.docs-url }}
        CONDA_SHIP_INSTALL_METHOD: ${{ inputs.install-method }}
        CONDA_SHIP_INSTALL_NAME: ${{ inputs.install-name }}
        CONDA_SHIP_INSTALL_SCHEME: ${{ inputs.install-scheme }}
        CONDA_SHIP_LAYOUT: ${{ inputs.layout }}
        CONDA_SHIP_RUNTIME: ${{ inputs.runtime }}
        CS_PATH: ${{ steps.download.outputs.cs_path }}
        CONDA_SHIP_ROOT: ${{ inputs.root }}
        CONDA_SHIP_TARGET: ${{ steps.resolve.outputs.target }}
        TEMPLATE_PATH: ${{ steps.download.outputs.template_path }}
      run: |
        dist_dir="${RUNNER_TEMP}/conda-ship-${CONDA_SHIP_TARGET}-dist"
        rm -rf "$dist_dir"
        mkdir -p "$dist_dir"

        build_args=(
          build
          --target "$CONDA_SHIP_TARGET"
          --target-label "$CONDA_SHIP_TARGET"
          --template "$TEMPLATE_PATH"
          --root "$CONDA_SHIP_ROOT"
          --out-dir "$dist_dir"
        )
        if [ -n "$CONDA_SHIP_RUNTIME" ]; then
          build_args+=(--runtime "$CONDA_SHIP_RUNTIME")
        fi
        if [ -n "$CONDA_SHIP_DELEGATE" ]; then
          build_args+=(--delegate "$CONDA_SHIP_DELEGATE")
        fi
        if [ -n "$CONDA_SHIP_LAYOUT" ]; then
          build_args+=(--layout "$CONDA_SHIP_LAYOUT")
        fi
        if [ -n "$CONDA_SHIP_DOCS_URL" ]; then
          build_args+=(--docs-url "$CONDA_SHIP_DOCS_URL")
        fi
        if [ -n "$CONDA_SHIP_INSTALL_SCHEME" ]; then
          build_args+=(--install-scheme "$CONDA_SHIP_INSTALL_SCHEME")
        fi
        if [ -n "$CONDA_SHIP_INSTALL_NAME" ]; then
          build_args+=(--install-name "$CONDA_SHIP_INSTALL_NAME")
        fi
        if [ -n "$CONDA_SHIP_INSTALL_METHOD" ]; then
          build_args+=(--install-method "$CONDA_SHIP_INSTALL_METHOD")
        fi
        "$CS_PATH" "${build_args[@]}" --dry-run
        "$CS_PATH" "${build_args[@]}"

    - name: Stage runtime outputs
      id: stage
      shell: bash
      env:
        CONDA_SHIP_TARGET: ${{ steps.resolve.outputs.target }}
      run: |
        artifact_dir="${RUNNER_TEMP}/conda-ship-${CONDA_SHIP_TARGET}-dist"
        info_count="$(find "$artifact_dir" -maxdepth 1 -type f -name "*.info.json" | wc -l | tr -d ' ')"
        if [ "$info_count" -ne 1 ]; then
          echo "Expected exactly one conda-ship info file in ${artifact_dir}, found ${info_count}." >&2
          exit 1
        fi
        info_path="$(find "$artifact_dir" -maxdepth 1 -type f -name "*.info.json" | sort | sed -n '1p')"
        stem_path="${info_path%.info.json}"
        if [ -f "${stem_path}.exe" ]; then
          binary_path="${stem_path}.exe"
        else
          binary_path="${stem_path}"
        fi
        lock_path="${stem_path}.runtime.lock"
        package_list_path="${stem_path}.packages.txt"
        checksums_path="${stem_path}.sha256"
        for required in "$binary_path" "$info_path" "$lock_path" "$package_list_path" "$checksums_path"; do
          if [ ! -f "$required" ]; then
            echo "Expected conda-ship output was not created: ${required}" >&2
            exit 1
          fi
        done
        echo "dist_path=${artifact_dir}" >> "$GITHUB_OUTPUT"
        echo "binary_path=${binary_path}" >> "$GITHUB_OUTPUT"
        echo "asset_name=$(basename "$binary_path")" >> "$GITHUB_OUTPUT"
        echo "info_path=${info_path}" >> "$GITHUB_OUTPUT"
        echo "lock_path=${lock_path}" >> "$GITHUB_OUTPUT"
        echo "package_list_path=${package_list_path}" >> "$GITHUB_OUTPUT"
        echo "checksums_path=${checksums_path}" >> "$GITHUB_OUTPUT"
        bundle_path="${stem_path}.bundle.tar.zst"
        if [ -f "$bundle_path" ]; then
          echo "bundle_path=${bundle_path}" >> "$GITHUB_OUTPUT"
        else
          echo "bundle_path=" >> "$GITHUB_OUTPUT"
        fi
