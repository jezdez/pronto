name: "Build conda bootstrap binary"
description: >
  Build a custom conda bootstrap binary with your choice of conda packages
  baked in. Runs on the current runner — use a matrix strategy for
  multi-platform builds.
branding:
  icon: package
  color: green

inputs:
  name:
    description: "Distribution binary name to build."
    required: true
  packages:
    description: >
      Comma-separated conda package specs to include in the bootstrapper.
      Example: "python >=3.12, conda >=25.1, numpy, pandas".
      When empty, uses the default packages from this conda-pronto configuration.
    required: false
    default: ""
  channels:
    description: >
      Comma-separated conda channels.
      When empty, uses the default (conda-forge).
    required: false
    default: ""
  exclude:
    description: >
      Comma-separated packages to exclude (along with their exclusive
      dependencies). When empty, uses the default exclusions.
    required: false
    default: ""
  ref:
    description: "Git ref of conda-pronto to build from (tag, branch, or SHA)."
    required: false
    default: "main"
  embed-bundle:
    description: >
      Embed package archives into the binary for offline bootstrap
      (increases size by 40-85 MB depending on platform). The output binary uses the z-suffixed artifact name.
    required: false
    default: "false"
  docs-url:
    description: "Documentation URL embedded in the runtime help output."
    required: false
    default: "https://jezdez.github.io/conda-pronto/"

outputs:
  binary-path:
    description: "Absolute path to the built distribution binary."
    value: ${{ steps.stage.outputs.binary_path }}
  asset-name:
    description: "Platform-qualified asset name."
    value: ${{ steps.stage.outputs.asset_name }}
  info-path:
    description: "Absolute path to the artifact info JSON."
    value: ${{ steps.stage.outputs.info_path }}
  lock-path:
    description: "Absolute path to the staged runtime lock."
    value: ${{ steps.stage.outputs.lock_path }}
  package-list-path:
    description: "Absolute path to the package list."
    value: ${{ steps.stage.outputs.package_list_path }}
  checksums-path:
    description: "Absolute path to the SHA256 checksum file."
    value: ${{ steps.stage.outputs.checksums_path }}

runs:
  using: composite
  steps:
    - name: Checkout conda-pronto
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: jezdez/conda-pronto
        ref: ${{ inputs.ref }}
        path: .conda-pronto
        persist-credentials: false

    - name: Setup pixi
      uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      with:
        manifest-path: .conda-pronto/pixi.toml
        cache: true

    - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - name: Configure custom packages
      if: inputs.packages != '' || inputs.channels != '' || inputs.exclude != ''
      shell: bash
      working-directory: .conda-pronto
      env:
        PRONTO_PACKAGES: ${{ inputs.packages }}
        PRONTO_CHANNELS: ${{ inputs.channels }}
        PRONTO_EXCLUDE: ${{ inputs.exclude }}
      run: |
        args=(configure)
        if [ -n "$PRONTO_PACKAGES" ]; then
          args+=(--packages "$PRONTO_PACKAGES")
        fi
        if [ -n "$PRONTO_CHANNELS" ]; then
          args+=(--channels "$PRONTO_CHANNELS")
        fi
        if [ -n "$PRONTO_EXCLUDE" ]; then
          args+=(--exclude "$PRONTO_EXCLUDE")
        fi
        pixi run -- cargo run -p conda-pronto -- "${args[@]}"
        pixi lock
        pixi run prepare

    - name: Build runtime
      shell: bash
      working-directory: .conda-pronto
      env:
        EMBED_BUNDLE: ${{ inputs.embed-bundle }}
        PRONTO_DOCS_URL: ${{ inputs.docs-url }}
        PRONTO_NAME: ${{ inputs.name }}
      run: |
        TARGET="$(rustc -vV | grep '^host:' | cut -d' ' -f2)"
        if [[ "$EMBED_BUNDLE" == "true" ]]; then
          LAYOUT="embedded"
        else
          LAYOUT="none"
        fi
        pixi run -- cargo run -p conda-pronto -- build \
          --layout "$LAYOUT" \
          --name "$PRONTO_NAME" \
          --target-label "$TARGET" \
          --out-dir "${GITHUB_WORKSPACE}/.pronto-artifacts"

    - name: Stage binary
      id: stage
      shell: bash
      env:
        EMBED_BUNDLE: ${{ inputs.embed-bundle }}
        PRONTO_NAME: ${{ inputs.name }}
      run: |
        TARGET="$(rustc -vV | grep '^host:' | cut -d' ' -f2)"
        if [[ "$EMBED_BUNDLE" == "true" ]]; then
          PREFIX="${PRONTO_NAME}z"
        else
          PREFIX="$PRONTO_NAME"
        fi
        STEM="${PREFIX}-${TARGET}"
        if [[ "$TARGET" == *"windows"* ]]; then
          ASSET_NAME="${STEM}.exe"
        else
          ASSET_NAME="${STEM}"
        fi
        ARTIFACT_DIR="${GITHUB_WORKSPACE}/.pronto-artifacts"
        BINARY_PATH="${ARTIFACT_DIR}/${ASSET_NAME}"
        echo "binary_path=${BINARY_PATH}" >> "$GITHUB_OUTPUT"
        echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
        echo "info_path=${ARTIFACT_DIR}/${STEM}.info.json" >> "$GITHUB_OUTPUT"
        echo "lock_path=${ARTIFACT_DIR}/${STEM}.runtime.lock" >> "$GITHUB_OUTPUT"
        echo "package_list_path=${ARTIFACT_DIR}/${STEM}.packages.txt" >> "$GITHUB_OUTPUT"
        echo "checksums_path=${ARTIFACT_DIR}/${STEM}.sha256" >> "$GITHUB_OUTPUT"
